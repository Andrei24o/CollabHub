spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/collabhub}
    username: ${SPRING_DATASOURCE_USERNAME:collabhub_user}
    password: ${SPRING_DATASOURCE_PASSWORD:collabhub_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:database_scripts

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  error:
    include-message: always

minio:
  url: ${MINIO_URL:http://localhost:9000}
  access:
    key: ${MINIO_ACCESS_KEY:minioadmin}
  secret:
    key: ${MINIO_SECRET_KEY:minioadmin}
  bucket:
    name: ${MINIO_BUCKET_NAME:collabhub-docs}

logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure.flyway: DEBUG
