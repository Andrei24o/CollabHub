version: '3.8'

services:
  postgres-db:
    image: postgres:15
    container_name: collabhub-db
    environment:
      POSTGRES_USER: collabhub_user
      POSTGRES_PASSWORD: collabhub_password
      POSTGRES_DB: collabhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collabhub_user -d collabhub"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: collabhub_storage
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  collabhub-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: collabhub-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-db:5432/collabhub
      SPRING_DATASOURCE_USERNAME: collabhub_user
      SPRING_DATASOURCE_PASSWORD: collabhub_password
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET_NAME: collabhub-docs
    depends_on:
      postgres-db:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
